# SelfHealingPlaywrightFramework — Playwright CI
# Dashboard ingest: plain curl multipart (no JSON-only fallback). See docs/dashboard-ingest.md

name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Run tests (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: "true"
      BASE_URL: "https://retail-website-fawn.vercel.app"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (with OS deps)
        run: npx playwright install --with-deps chromium

      # Do not pass --reporter here: it overrides playwright.config.ts and drops
      # json.outputFile, so playwright-report/results.json is never written.
      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # test-results/ is gitignored; hashFiles() ignores gitignored paths, so use a filesystem check.
      # Playwright only creates this dir when writing traces/screenshots/videos (e.g. failures/retries).
      - name: Check for test-results artifacts
        id: test_results_artifacts
        if: always()
        run: |
          if find test-results -type f -print -quit 2>/dev/null | grep -q .; then
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload test results (traces, screenshots)
        if: always() && steps.test_results_artifacts.outputs.has_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Warm dashboard API (Render cold start)
        if: always()
        continue-on-error: true
        env:
          DASHBOARD_URL: https://realtime-testing-dashboard-api-ld7t.onrender.com
        run: |
          echo "GET $DASHBOARD_URL/api/health (wake sleeping instance)"
          curl -sS -w "\nHTTP %{http_code}\n" --connect-timeout 10 --max-time 120 "$DASHBOARD_URL/api/health" || true

      # One HTTP call: multipart with payload (JSON file) + report_zip (zip). No Node fetch / no fallback to /run.
      - name: Publish results to dashboard (multipart curl)
        if: always()
        continue-on-error: true
        env:
          DASHBOARD_URL: https://realtime-testing-dashboard-api-ld7t.onrender.com
          DASHBOARD_INGEST_TOKEN: ${{ secrets.DASHBOARD_INGEST_TOKEN }}
          SUITE_NAME: SelfHealing Playwright
          ENVIRONMENT: CI
          BUILD_VERSION: ${{ github.sha }}
          DASHBOARD_MAX_TIME_SEC: "300"
          DASHBOARD_POST_RETRIES: "4"
          DASHBOARD_POST_RETRY_DELAY_SEC: "8"
        run: |
          set -uo pipefail
          DASHBOARD_URL="${DASHBOARD_URL%/}"
          if [ -z "${DASHBOARD_INGEST_TOKEN:-}" ]; then
            echo "DASHBOARD_INGEST_TOKEN not set — skip dashboard ingest"
            exit 0
          fi
          if [ ! -f playwright-report/results.json ] || [ ! -f playwright-report/index.html ]; then
            echo "Missing playwright-report/results.json or index.html — skip dashboard ingest"
            exit 0
          fi

          node scripts/build-dashboard-payload.mjs playwright-report/results.json payload.json
          ( cd playwright-report && zip -qr ../report.zip . )

          URL="${DASHBOARD_URL}/api/ingest/github-actions/run-with-report"
          echo ""
          echo "========== Dashboard ingest (check this log) =========="
          echo "POST ${URL}"
          echo "Parts: -F \"payload=@payload.json;type=application/json\" -F \"report_zip=@report.zip;type=application/zip\""
          echo "curl equivalent (token redacted):"
          echo "  curl -f -sS -X POST \"${URL}\" -H \"X-Ingest-Token: ***\" \\"
          echo "    -F \"payload=@payload.json;type=application/json\" \\"
          echo "    -F \"report_zip=@report.zip;type=application/zip\""
          echo "========================================================"

          MAXT="${DASHBOARD_MAX_TIME_SEC:-300}"
          RETRIES="${DASHBOARD_POST_RETRIES:-4}"
          DELAY="${DASHBOARD_POST_RETRY_DELAY_SEC:-8}"
          HDR=$(mktemp)
          BODY=$(mktemp)
          cleanup() { rm -f "$HDR" "$BODY"; }
          trap cleanup EXIT

          attempt=1
          while [ "$attempt" -le "$RETRIES" ]; do
            echo "[dashboard] curl attempt ${attempt}/${RETRIES}"
            if curl -f -sS --max-time "$MAXT" -X POST "$URL" \
              -H "X-Ingest-Token: ${DASHBOARD_INGEST_TOKEN}" \
              -D "$HDR" -o "$BODY" \
              -F "payload=@payload.json;type=application/json" \
              -F "report_zip=@report.zip;type=application/zip"; then
              echo ""
              echo "--- Response headers ---"
              cat "$HDR"
              echo "--- Response body ---"
              cat "$BODY"
              echo ""
              if grep -qiE '^x-ingest-report-zip-bytes:' "$HDR" || grep -qiE '^X-Ingest-Report-Zip-Bytes:' "$HDR"; then
                echo "[dashboard] X-Ingest-Report-Zip-Bytes present (see headers above; expect > 0 when zip stored)"
              fi
              if grep -q '"has_html_report_zip"[[:space:]]*:[[:space:]]*true' "$BODY" 2>/dev/null; then
                echo '[dashboard] OK: response body contains "has_html_report_zip": true'
              else
                echo "[dashboard] WARN: confirm JSON body includes has_html_report_zip: true"
              fi
              exit 0
            fi
            echo "[dashboard] curl failed (exit $?)"
            if [ "$attempt" -lt "$RETRIES" ]; then
              sleep "$DELAY"
            fi
            attempt=$((attempt + 1))
          done
          echo "[dashboard] All curl attempts failed"
          exit 1
