name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Run tests (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: "true"
      BASE_URL: "https://retail-website-two.vercel.app"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (with OS deps)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --reporter=html,json

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results (traces, screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Publish results to dashboard
        if: always()
        env:
          DASHBOARD_URL: https://realtime-testing-dashboard-api.onrender.com
          DASHBOARD_INGEST_TOKEN: ${{ secrets.DASHBOARD_INGEST_TOKEN }}
          SUITE_NAME: SelfHealing Playwright
          ENVIRONMENT: CI
          BUILD_VERSION: ${{ github.sha }}
        run: node scripts/playwright-report-to-dashboard.mjs playwright-report/results.json