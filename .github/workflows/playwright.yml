name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Run tests (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: "true"
      BASE_URL: "https://retail-website-two.vercel.app"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (with OS deps)
        run: npx playwright install --with-deps chromium

      # Do not pass --reporter here: it overrides playwright.config.ts and drops
      # json.outputFile, so playwright-report/results.json is never written.
      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # test-results/ exists only when Playwright writes traces/screenshots/videos (e.g. failures/retries).
      - name: Upload test results (traces, screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      # Best-effort: do not fail the workflow if the dashboard API is down (e.g. Render cold start / network).
      # Do not use `secrets.*` in `if:` — GitHub rejects it. The script exits 0 when the token is unset.
      - name: Warm dashboard API (Render free tier cold start)
        if: always()
        continue-on-error: true
        env:
          DASHBOARD_URL: https://realtime-testing-dashboard-api.onrender.com
        run: |
          echo "GET $DASHBOARD_URL/ (wake sleeping instance; may take 1-3 min)"
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --connect-timeout 10 --max-time 240 "$DASHBOARD_URL/" || true

      - name: Publish results to dashboard
        if: always()
        continue-on-error: true
        env:
          DASHBOARD_URL: https://realtime-testing-dashboard-api.onrender.com
          # Cold start + ingest can exceed 2 min; 5 min is safer on free Render.
          DASHBOARD_FETCH_TIMEOUT_MS: '300000'
          DASHBOARD_INGEST_TOKEN: ${{ secrets.DASHBOARD_INGEST_TOKEN }}
          SUITE_NAME: SelfHealing Playwright
          ENVIRONMENT: CI
          BUILD_VERSION: ${{ github.sha }}
        run: node scripts/playwright-report-to-dashboard.mjs playwright-report/results.json