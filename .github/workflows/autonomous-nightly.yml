# Phase 10 — autonomous nightly / CI smoke (governed, mock planner, env secrets)
name: Autonomous Nightly

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  autonomous-smoke:
    name: Autonomous CI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: "true"
      RUN_AUTONOMOUS_CI: "1"
      BASE_URL: "https://retail-website-fawn.vercel.app"
      AUTONOMOUS_ALLOWED_DOMAINS: "vercel.app"
      AUTONOMOUS_MAX_COST_USD: "0.25"
      AUTONOMOUS_MAX_SUITE_COST_USD: "0.50"
      AUTONOMOUS_CUSTOMER_EMAIL: "test@demo.com"
      AUTONOMOUS_CUSTOMER_PASSWORD: "password123"
      AUTONOMOUS_PLANNER: "mock"
      MAINTENANCE_AGENT: "1"
      MAINTENANCE_TICKET_THRESHOLD: "3"
      MAINTENANCE_TICKET_PROVIDER: "jira"
      MAINTENANCE_PUBLISH_CI_SUMMARY: "1"
      # Live Jira — add repository secrets: JIRA_BASE_URL, JIRA_EMAIL, JIRA_API_TOKEN, JIRA_PROJECT_KEY
      MAINTENANCE_PUBLISH_JIRA: "1"
      JIRA_PUBLISH_EVERY_RUN: "1"
      JIRA_CI_SUMMARY_ISSUE_TYPE: "Story,Task,Bug"
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore maintenance failure store
        uses: actions/cache@v4
        with:
          path: |
            .maintenance-failures.json
            .maintenance-jira-published.json
          key: maintenance-store-${{ github.repository }}
          restore-keys: |
            maintenance-store-${{ github.repository }}

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run install:nova-retail-qa

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run autonomous CI smoke
        run: npm run test:autonomous-ci-smoke --prefix examples/nova-retail-qa

      - name: Publish Jira ticket (every run)
        if: always()
        run: npm run publish:ci-jira-ticket --prefix examples/nova-retail-qa
        env:
          CI_RUN_STATUS: ${{ job.status }}

      - name: Upload maintenance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-output
          path: |
            examples/nova-retail-qa/maintenance-output/
            .maintenance-failures.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload autonomous review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-review
          path: examples/nova-retail-qa/autonomous-review/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-playwright-report
          path: examples/nova-retail-qa/playwright-report/
          retention-days: 7
